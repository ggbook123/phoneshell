<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <link rel="stylesheet" href="./xterm.min.css" />
  <style>
    :root {
      color-scheme: dark;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b0f14;
      touch-action: manipulation;
      font-family: "Cascadia Mono", "Cascadia Code", "Consolas", monospace;
    }

    #terminal {
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      padding: 6px 4px;
    }

    .xterm {
      height: 100%;
    }

    .xterm-viewport,
    .xterm-screen,
    .xterm-helper-textarea {
      touch-action: manipulation;
    }
  </style>
  <script src="./xterm.min.js"></script>
  <script src="./addon-fit.min.js"></script>
</head>
<body>
  <div id="terminal"></div>
  <script>
    var terminalElement = document.getElementById('terminal');
    var term = new Terminal({
      cursorBlink: true,
      cursorStyle: 'block',
      fontSize: 13,
      lineHeight: 1.08,
      scrollback: 2000,
      convertEol: false,
      fontFamily: "'Cascadia Code', 'Consolas', 'Courier New', monospace",
      theme: {
        background: '#0b0f14',
        foreground: '#e8edf2',
        cursor: '#f4f7fb',
        selectionBackground: 'rgba(128, 190, 255, 0.25)'
      }
    });

    var fitAddon = new FitAddon.FitAddon();
    var lastCols = 0;
    var lastRows = 0;

    term.loadAddon(fitAddon);
    term.open(terminalElement);

    function callNative(methodName) {
      if (!window.nativeApp || typeof window.nativeApp[methodName] !== 'function') {
        return;
      }

      var args = Array.prototype.slice.call(arguments, 1);
      try {
        window.nativeApp[methodName].apply(window.nativeApp, args);
      } catch (_error) {
      }
    }

    function fitAndReport(isInitial) {
      fitAddon.fit();

      if (!term.cols || !term.rows) {
        return;
      }

      if (term.cols === lastCols && term.rows === lastRows && !isInitial) {
        return;
      }

      lastCols = term.cols;
      lastRows = term.rows;

      if (isInitial) {
        callNative('onTerminalReady', lastCols, lastRows);
      } else {
        callNative('onTerminalResize', lastCols, lastRows);
      }
    }

    function safeWrite(data) {
      if (typeof data !== 'string' || data.length === 0) {
        return;
      }
      term.write(data);
    }

    term.onData(function(data) {
      callNative('sendInput', data);
    });

    terminalElement.addEventListener('pointerdown', function() {
      callNative('onTerminalInteraction');
      term.focus();
    }, { passive: true });

    window.phoneShell = {
      write: function(data) {
        safeWrite(data);
      },
      clear: function() {
        term.reset();
      },
      focus: function() {
        term.focus();
      },
      syncResize: function() {
        fitAndReport(false);
      }
    };

    new ResizeObserver(function() {
      fitAndReport(false);
    }).observe(terminalElement);

    window.addEventListener('orientationchange', function() {
      setTimeout(function() {
        fitAndReport(false);
      }, 120);
    });

    setTimeout(function() {
      fitAndReport(true);
      term.focus();
    }, 120);
  </script>
</body>
</html>
